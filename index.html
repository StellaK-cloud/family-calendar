  const [dbLoading, setDbLoading] = useState(true);
  const [dbError, setDbError] = useState(null);
  const [pendingUsers, setPendingUsers] = useState({});
  const [vaxSelKid, setVaxSelKid] = useState("kid1");
  const [vaxExpandedItem, setVaxExpandedItem] = useState(null);
  const [showICS, setShowICS] = useState(false);
  const [icsTxt, setIcsTxt] = useState("");
  const [icsPv, setIcsPv] = useState([]);
  const [icsLoading, setIcsLoading] = useState(false);

  const ADMIN_MEMBER_IDS = ["mom"];
  const MAMA_EMAIL = "sstteellaa26@gmail.com";
  const ADMIN_EMAILS = [MAMA_EMAIL];
  const ADMIN_EMAIL_MAP = { "sstteellaa26@gmail.com": "mom" };

  /* ─── 監聽登入狀態 ─── */
  useEffect(() => {
    const unsub = auth.onAuthStateChanged(user => {
      setAuthUser(user);
      setAuthLoading(false);
    });
    return unsub;
  }, []);

  /* ─── 監聽帳號綁定表 ─── */
  useEffect(() => {
    const ref = db.ref('accountMap');
    ref.on('value', snap => {
      setAccountMap(snap.val() || {});
    });
    return () => ref.off();
  }, []);

  /* ─── 監聽待審核使用者 ─── */
  useEffect(() => {
    const ref = db.ref('pendingUsers');
    ref.on('value', snap => { setPendingUsers(snap.val() || {}); });
    return () => ref.off();
  }, []);

  /* ─── 媽媽自動綁定 + 其他人登記待審核 ─── */
  useEffect(() => {
    if (!authUser) return;
    const email = authUser.email;
    const key = email.replace(/\./g, '_');
    if (email === MAMA_EMAIL) {
      if (!accountMap[key]) {
        db.ref('accountMap/' + key).set("mom");
      }
      db.ref('pendingUsers/' + key).remove();
    } else if (!accountMap[key]) {
      db.ref('pendingUsers/' + key).set({
        email: email,
        name: authUser.displayName || email,
        photoURL: authUser.photoURL || "",
        timestamp: Date.now()
      });
    }
  }, [authUser, accountMap]);

  /* ─── 登入/登出 ─── */
  const doLogin = () => auth.signInWithPopup(googleProvider).catch(err => alert("登入失敗：" + err.message));
  const doLogout = () => { auth.signOut(); };

  /* ─── 計算當前使用者的成員 ID 和是否為管理員 ─── */
  const emailKey = authUser ? authUser.email.replace(/\./g, '_') : "";
  const curUser = accountMap[emailKey] || null;
  const isAdmin = authUser ? ADMIN_EMAILS.includes(authUser.email) : false;

  /* ─── 帳號綁定函數 ─── */
  const bindAccount = (email, memberId) => {
    const key = email.replace(/\./g, '_');
    if (memberId) {
      db.ref('accountMap/' + key).set(memberId);
    } else {
      db.ref('accountMap/' + key).remove();
    }
  };

  /* ─── Firebase refs (must be before any conditional returns) ─── */
  const dbRef = useMemo(() => ({
    members: db.ref('members'),
    events: db.ref('events'),
    shop: db.ref('shop'),
    vaccineStatus: db.ref('vaccineStatus'),
  }), []);

  const fromDB = React.useRef({ members: false, events: false, shop: false, vaccineStatus: false });

  /* ─── 首次載入：從 Firebase 讀資料 ─── */
  const DB_VERSION = "v8"; // 改這個值會觸發資料重置
  useEffect(() => {
    if (!authUser || !curUser) return;

    // 檢查版本號，如果不同就清除舊資料
    db.ref('_dbVersion').once('value').then(snap => {
      if (snap.val() !== DB_VERSION) {
        // 清除舊資料，重新寫入
        db.ref('events').remove();
        db.ref('members').remove();
        db.ref('shop').remove();
        db.ref('vaccineStatus').remove();
        db.ref('accountMap').remove();
        db.ref('pendingUsers').remove();
        db.ref('_dbVersion').set(DB_VERSION);
        console.log("DB reset to " + DB_VERSION);
      }
    });

    let loaded = { members: false, events: false, shop: false, vaccineStatus: false };
    const checkDone = () => {
      if (loaded.members && loaded.events && loaded.shop && loaded.vaccineStatus) setDbLoading(false);
    };

    dbRef.members.on('value', (snap) => {
      const val = snap.val();
      if (val) {
        const arr = Array.isArray(val) ? val.filter(Boolean) : Object.values(val);
        fromDB.current.members = true;
        setMembers(arr);
      } else if (!loaded.members) {
        dbRef.members.set(DEFAULT_MEMBERS);
      }
      loaded.members = true;
      checkDone();
    }, (err) => { setDbError("資料庫連線失敗：" + err.message); loaded.members = true; checkDone(); });

    dbRef.events.on('value', (snap) => {
      const val = snap.val();
      if (val) {
        const arr = Array.isArray(val) ? val.filter(Boolean) : Object.values(val);
        fromDB.current.events = true;
        setEvents(arr);
      } else if (!loaded.events) {
        dbRef.events.set(INIT_EVENTS);
      }
      loaded.events = true;
      checkDone();
    }, (err) => { setDbError("資料庫連線失敗：" + err.message); loaded.events = true; checkDone(); });

    dbRef.shop.on('value', (snap) => {
      const val = snap.val();
      if (val) {
        const arr = Array.isArray(val) ? val.filter(Boolean) : Object.values(val);
        fromDB.current.shop = true;
        setShop(arr);
      } else if (!loaded.shop) {
        dbRef.shop.set(INIT_SHOP);
      }
      loaded.shop = true;
      checkDone();
    }, (err) => { setDbError("資料庫連線失敗：" + err.message); loaded.shop = true; checkDone(); });

    dbRef.vaccineStatus.on('value', (snap) => {
      const val = snap.val();
      if (val) {
        fromDB.current.vaccineStatus = true;
        setVaccineStatus(val);
      }
      loaded.vaccineStatus = true;
      checkDone();
    }, (err) => { loaded.vaccineStatus = true; checkDone(); });

    return () => { dbRef.members.off(); dbRef.events.off(); dbRef.shop.off(); dbRef.vaccineStatus.off(); };
  }, [dbRef, authUser, curUser]);

  /* ─── 當 state 變化時寫回 Firebase ─── */

  const CInput = (props) => {
    const {value, onChange, onKeyDown, ...rest} = props;
    const ref = React.useRef(null);
    const composing = React.useRef(false);
    const lastValue = React.useRef(value||"");
    React.useEffect(() => {
      lastValue.current = value||"";
      if(ref.current && !composing.current) {
        ref.current.value = value||"";
      }
    }, [value]);
    return React.createElement('input', {
      ...rest, ref, defaultValue: value||"",
      onInput: (e) => {
        if(!composing.current && onChange) {
          onChange(e);
        }
      },
      onChange: () => {},
      onCompositionStart: () => { composing.current = true; },
      onCompositionEnd: (e) => {
        composing.current = false;
        if(onChange) onChange(e);
      },
      onKeyDown: (e) => { if(!composing.current && onKeyDown) onKeyDown(e); }
    });
  };

    const ref = React.useRef(null);

      if(ref.current && !composing.current) {

      }

        if(!composing.current && onChange) onChange(e);
      },

  /* ═══ VACCINE ═══ */
  const VaxView=()=>{
    const kids = members.filter(f=>f.id==="kid1"||f.id==="kid2");
    const selKid = vaxSelKid;
    const setSelKid = setVaxSelKid;
    const expandedVax = vaxExpandedItem;
    const setExpandedVax = setVaxExpandedItem;

    // Calculate expected dates based on kid birthday
    const kidBirthdays = { kid1: "2024-06-16", kid2: "2025-10-15" };

    const calcExpectedDate = (birthday, ageStr) => {
      if (!birthday) return "";
      const [by, bm, bd] = birthday.split("-").map(Number);
      const birth = new Date(by, bm-1, bd);
      if (ageStr === "出生24hr內") return birthday;
      if (ageStr === "每年") return "";
      const mMatch = ageStr.match(/(\d+)個月/);
      const rangeMatch = ageStr.match(/(\d+)~(\d+)個月/);
      const yearMatch = ageStr.match(/(\d+)歲/);
      if (rangeMatch) {
        const months = parseInt(rangeMatch[1]);
        const d = new Date(birth); d.setMonth(d.getMonth()+months);
        return fmtD(d);
      }
      if (mMatch) {
        const months = parseInt(mMatch[1]);
        const d = new Date(birth); d.setMonth(d.getMonth()+months);
        return fmtD(d);
      }
      if (yearMatch) {
        const years = parseInt(yearMatch[1]);
        const d = new Date(birth); d.setFullYear(d.getFullYear()+years);
        return fmtD(d);
      }
      return "";
    };

    const getVaxKey = (kidId, vaxIdx) => `${kidId}_vax_${vaxIdx}`;

    const getVaxStatus = (kidId, vaxIdx) => {
      const key = getVaxKey(kidId, vaxIdx);
      return vaccineStatus[key] || { status: "pending", bookedDate: "", bookedTime: "", note: "", location: "" };
    };

    const updateVaxStatus = (kidId, vaxIdx, updates) => {
      const key = getVaxKey(kidId, vaxIdx);
      const cur = getVaxStatus(kidId, vaxIdx);
      const newStatus = { ...cur, ...updates };
      setVaccineStatus(p => ({ ...p, [key]: newStatus }));

      // If status is "booked", create/update calendar event
      if (updates.status === "booked" || (cur.status === "booked" && (updates.bookedDate || updates.bookedTime))) {
        const vax = VACCINE_SCHEDULE[vaxIdx];
        const kid = fm(kidId);
        const bDate = updates.bookedDate || cur.bookedDate;
        const bTime = updates.bookedTime || cur.bookedTime;
        const loc = updates.location !== undefined ? updates.location : cur.location;
        if (bDate && kid) {
          const evTitle = `${kid.name} ${vax.name}（已預約）`;
          const existingEvId = `vax_booked_${kidId}_${vaxIdx}`;
          const newEv = {
            id: existingEvId,
            title: evTitle,
            type: "vaccine",
            members: [kidId],
            date: bDate,
            endDate: "",
            note: `預約接種：${vax.code}${loc ? `\n📍 ${loc}` : ""}`,
            allDay: !bTime,
            time: bTime || "",
            location: loc || "",
          };
          setEvents(p => {
            const exists = p.find(e => e.id === existingEvId);
            if (exists) return p.map(e => e.id === existingEvId ? newEv : e);
            return [...p, newEv];
          });
          notify("已預約並加入行事曆 ✓");
        }
      }
      // If changing away from booked, remove the calendar event
      if (updates.status && updates.status !== "booked" && cur.status === "booked") {
        const existingEvId = `vax_booked_${kidId}_${vaxIdx}`;
        setEvents(p => p.filter(e => e.id !== existingEvId));
      }
    };

    const statusColors = {
      pending: { bg: "#FFF7ED", border: "#F97316", text: "#F97316", label: "⏳ 預計施打" },
      done: { bg: "#ECFDF5", border: "#10B981", text: "#10B981", label: "✅ 已施打" },
      skip: { bg: "#F3F4F6", border: "#9CA3AF", text: "#9CA3AF", label: "⏭️ 不施打" },
      booked: { bg: "#EFF6FF", border: "#3B82F6", text: "#3B82F6", label: "📅 已預約" },
      other: { bg: "#FDF2F8", border: "#EC4899", text: "#EC4899", label: "📝 其他" },
    };

    const selKidData = fm(selKid);

    return(
    <div style={S.card}>
      <h2 style={{margin:"0 0 8px",fontSize:20,fontWeight:700}}>💉 預防針追蹤</h2>
      <p style={{color:"#6B7280",fontSize:13,margin:"0 0 16px"}}>點擊各預防針可設定施打狀態、預約日期、地點等</p>

      {/* Kid selector */}
      <div style={{display:"flex",gap:10,marginBottom:20}}>
        {kids.map(kid=>(
          <div key={kid.id} style={{flex:1,padding:"14px 16px",borderRadius:14,cursor:"pointer",display:"flex",alignItems:"center",gap:10,
            background:selKid===kid.id?`${kid.color}12`:"#F9FAFB",
            border:selKid===kid.id?`2px solid ${kid.color}`:"1px solid #E5E7EB",
            transition:"all 0.2s"
          }} onClick={()=>setSelKid(kid.id)}>
            <Avatar member={kid} size={36} borderRadius={12}/>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:selKid===kid.id?kid.color:"#374151"}}>{kid.name}</div>
              <div style={{fontSize:11,color:"#9CA3AF"}}>生日：{kidBirthdays[kid.id]}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Upcoming reminders */}
      {(()=>{
        const upcoming = VACCINE_SCHEDULE.map((v,i)=>{
          const st = getVaxStatus(selKid, i);
          const expectedDate = calcExpectedDate(kidBirthdays[selKid], v.age);
          const displayDate = st.status === "booked" && st.bookedDate ? st.bookedDate : expectedDate;
          return { ...v, idx: i, st, expectedDate, displayDate };
        }).filter(v => v.st.status === "pending" || v.st.status === "booked")
          .filter(v => v.displayDate && parseD(v.displayDate) >= new Date())
          .sort((a,b) => a.displayDate.localeCompare(b.displayDate))
          .slice(0, 3);
        
        return upcoming.length > 0 && (
          <div style={{marginBottom:24}}>
            <h3 style={{fontSize:15,fontWeight:700,color:"#EF4444",marginBottom:10}}>🔔 即將到來（{selKidData?.name}）</h3>
            {upcoming.map(v=>{
              const sc = statusColors[v.st.status];
              return(
                <div key={v.idx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",borderRadius:14,background:sc.bg,border:`1px solid ${sc.border}33`,marginBottom:8,cursor:"pointer"}} onClick={()=>setExpandedVax(expandedVax===`${selKid}_${v.idx}`?null:`${selKid}_${v.idx}`)}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14,display:"flex",alignItems:"center",gap:6}}>💉 {selKidData?.name} {v.name}</div>
                    <div style={{fontSize:12,color:"#6B7280",marginTop:2}}>
                      {v.st.status === "booked" ? `📅 預約：${v.st.bookedDate}${v.st.bookedTime?` ${v.st.bookedTime}`:""}` : `⏳ 預計：${v.displayDate}`}
                      {v.st.location && <span style={{marginLeft:6}}>📍 {v.st.location}</span>}
                    </div>
                  </div>
                  <span style={{fontSize:11,padding:"4px 10px",borderRadius:8,background:sc.border,color:"white",fontWeight:700}}>{sc.label}</span>
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* Full schedule */}
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>📋 {selKidData?.name} 接種時程表</h3>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {VACCINE_SCHEDULE.map((v,i)=>{
          const st = getVaxStatus(selKid, i);
          const sc = statusColors[st.status];
          const expectedDate = calcExpectedDate(kidBirthdays[selKid], v.age);
          const isExpanded = expandedVax === `${selKid}_${i}`;
          const isPast = expectedDate && parseD(expectedDate) < new Date() && st.status === "pending";

          return(
            <div key={i} style={{borderRadius:14,overflow:"hidden",border:`1px solid ${sc.border}33`,background:sc.bg,transition:"all 0.2s"}}>
              {/* Header row */}
              <div style={{display:"flex",gap:12,padding:"14px 16px",cursor:"pointer",alignItems:"center"}} onClick={()=>setExpandedVax(isExpanded?null:`${selKid}_${i}`)}>
                <div style={{minWidth:80}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#F97316"}}>{v.age}</div>
                  {expectedDate && <div style={{fontSize:10,color:isPast?"#EF4444":"#9CA3AF",fontWeight:isPast?700:400}}>預計 {expectedDate}</div>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
                    {v.name}
                  </div>
                  <div style={{fontSize:11,color:"#9CA3AF",marginTop:2}}>{v.code}</div>
                  {st.status === "booked" && st.bookedDate && (
                    <div style={{fontSize:11,color:"#3B82F6",marginTop:3,fontWeight:600,padding:"3px 8px",borderRadius:6,background:"#3B82F610",display:"inline-flex",alignItems:"center",gap:4}}>
                      📅 已預約：{st.bookedDate}{st.bookedTime?` ${st.bookedTime}`:""}{st.location?` ・📍 ${st.location}`:""}
                    </div>
                  )}
                  {st.status === "done" && (
                    <div style={{fontSize:11,color:"#10B981",marginTop:3,fontWeight:600,padding:"3px 8px",borderRadius:6,background:"#10B98110",display:"inline-flex",alignItems:"center",gap:4}}>
                      ✅ 已施打{st.bookedDate?`：${st.bookedDate}`:""}{st.location?` ・📍 ${st.location}`:""}
                    </div>
                  )}
                  {st.status === "other" && st.note && <div style={{fontSize:11,color:"#EC4899",marginTop:2}}>📝 {st.note}</div>}
                </div>
                <span style={{fontSize:10,padding:"3px 8px",borderRadius:6,background:`${sc.border}20`,color:sc.text,fontWeight:700,flexShrink:0}}>{sc.label}</span>
                <span style={{fontSize:14,color:"#9CA3AF",flexShrink:0}}>{isExpanded?"▲":"▼"}</span>
              </div>

              {/* Expanded detail */}
              {isExpanded && (
                <div style={{padding:"0 16px 16px",borderTop:`1px solid ${sc.border}20`}}>
                  <div style={{paddingTop:14}}>
                    {/* Status buttons */}
                    <div style={{marginBottom:14}}>
                      <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:6}}>施打狀態</label>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {Object.entries(statusColors).map(([key,val])=>(
                          <span key={key} style={{
                            padding:"6px 14px",borderRadius:10,fontSize:12,fontWeight:600,cursor:"pointer",
                            border:st.status===key?`2px solid ${val.border}`:`1px solid #E5E7EB`,
                            background:st.status===key?val.bg:"white",
                            color:st.status===key?val.text:"#6B7280",
                          }} onClick={(e)=>{e.stopPropagation();updateVaxStatus(selKid, i, {status:key});}}>{val.label}</span>
                        ))}
                      </div>
                    </div>

                    {/* Booked / Pending date/time — show for booked and pending */}
                    {(st.status === "booked" || st.status === "pending") && (
                      <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
                        <div style={{flex:1,minWidth:140}}>
                          <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>{st.status==="booked"?"預約日期":"預計施打日期"}</label>
                          <input style={S.inp} type="date" value={st.status==="booked"?(st.bookedDate||""):(st.bookedDate||expectedDate||"")} onChange={e=>updateVaxStatus(selKid, i, {bookedDate:e.target.value})}/>
                        </div>
                        <div style={{flex:1,minWidth:120}}>
                          <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>{st.status==="booked"?"預約時間":"時間"}</label>
                          <input style={S.inp} type="time" value={st.bookedTime||""} onChange={e=>updateVaxStatus(selKid, i, {bookedTime:e.target.value})}/>
                        </div>
                      </div>
                    )}

                    {/* Done date */}
                    {st.status === "done" && (
                      <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
                        <div style={{flex:1,minWidth:140}}>
                          <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>實際施打日期</label>
                          <input style={S.inp} type="date" value={st.bookedDate||""} onChange={e=>updateVaxStatus(selKid, i, {bookedDate:e.target.value})}/>
                        </div>
                      </div>
                    )}

                    {/* Location — show for all statuses */}
                    <div style={{marginBottom:12}}>
                      <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>📍 施打地點</label>
                      <CInput style={S.inp} placeholder="例：成大醫院、衛生所..." value={st.location||""} onChange={e=>updateVaxStatus(selKid, i, {location:e.target.value})}/>
                    </div>

                    {/* Note — show for all statuses */}
                    <div style={{marginBottom:8}}>
                      <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>{st.status === "other" ? "📝 備註（必填）" : "備註"}</label>
                      {st.status === "other" ? (
                        <CTextarea style={{...S.inp,minHeight:50,resize:"vertical"}} placeholder="輸入備註..." value={st.note||""} onChange={e=>updateVaxStatus(selKid, i, {note:e.target.value})}/>
                      ) : (
                        <CInput style={S.inp} placeholder="補充說明..." value={st.note||""} onChange={e=>updateVaxStatus(selKid, i, {note:e.target.value})}/>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Summary stats */}
      <div style={{marginTop:24,padding:16,borderRadius:14,background:"#F9FAFB",border:"1px solid #E5E7EB"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>📊 {selKidData?.name} 接種統計</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          {Object.entries(statusColors).map(([key,val])=>{
            const count = VACCINE_SCHEDULE.filter((_,i)=>getVaxStatus(selKid,i).status===key).length;
            return(
              <div key={key} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:8,background:val.bg,border:`1px solid ${val.border}33`}}>
                <span style={{fontSize:18,fontWeight:800,color:val.text}}>{count}</span>
                <span style={{fontSize:11,color:val.text,fontWeight:600}}>{val.label}</span>
              </div>
            );
          })}
        </div>
      </div>

      <button style={{...S.tb,width:"100%",padding:12,textAlign:"center",marginTop:20,borderColor:"#EF4444",color:"#EF4444"}} onClick={()=>{setEditEv(null);setShowAdd(true);}}>+ 新增預防針/看診提醒</button>
    </div>
  );};

        <button style={{padding:"10px 20px",borderRadius:10,border:"none",fontWeight:700,fontSize:14,background:"linear-gradient(135deg,#F97316,#EC4899)",color:"white",cursor:"pointer",boxShadow:"0 4px 12px rgba(249,115,22,0.3)",whiteSpace:"nowrap"}} onClick={addI}>+ 新增</button>
      </div>

      {/* 記得帶走 — grouped by home */}
      {Object.entries(supportedByHome).some(([,arr])=>arr.length>0) && (

          {homes.map(h=>{

            if(items.length===0) return null;
            return(
              <div key={h.id} style={{marginBottom:12,padding:14,borderRadius:14,background:`${h.color}06`,border:`1px solid ${h.color}20`}}>
                <div style={{fontSize:13,fontWeight:700,color:h.color,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>{h.emoji} 送到 {h.label}</div>
                {items.map(item=>{
                  const cat=SHOPPING_CATEGORIES.find(c=>c.id===item.category), sup=fm(item.supportedBy);
                  return(
                    <div key={item.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,background:"white",border:"1px solid #FBCFE8",marginBottom:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:18}}>{cat?.icon}</span>
                        <div>
                          <span style={{fontWeight:700,fontSize:14}}>{item.name}</span>
                          {item.note&&<span style={{fontSize:11,color:"#9CA3AF"}}> （{item.note}）</span>}
                          <div style={{fontSize:11,color:sup?.color||"#9CA3AF",marginTop:2,display:"flex",alignItems:"center",gap:2}}><MiniAvatar member={sup} size={14}/> {sup?.name} 支援</div>

                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span>{cat?.icon}</span><span style={{fontWeight:700}}>{item.name}</span>
                      <span style={{fontSize:11,color:sup?.color,display:"inline-flex",alignItems:"center",gap:2}}><MiniAvatar member={sup} size={14}/>{sup?.name} 支援</span>
                    </div>
                    <button style={{padding:"4px 12px",borderRadius:8,border:"none",fontSize:12,fontWeight:700,background:"#10B981",color:"white",cursor:"pointer"}} onClick={()=>markBought(item.id)}>已帶走 ✓</button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Unbought */}
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:10}}>📋 待購清單 ({unbought.length})</h3>
      {unbought.length===0?<div style={{textAlign:"center",padding:24,color:"#9CA3AF"}}><div style={{fontSize:36,marginBottom:8}}>🎉</div><div>都買好了！</div></div>:
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}>
        {unbought.map(item=>{
          const cat=SHOPPING_CATEGORIES.find(c=>c.id===item.category);
          const adder=fm(item.addedBy);
          const supporter=item.supportedBy?fm(item.supportedBy):null;

              {/* Buy button — everyone can mark as bought */}
              <div style={{width:24,height:24,borderRadius:7,border:"2px solid #10B981",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#10B981",fontSize:12,fontWeight:700}} title="我已購買" onClick={()=>markBought(item.id)}>✓</div>

              {!item.supportedBy ? (

                    <option value="">送到...</option>

      {/* Bought */}
      {bought.length>0&&<>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:10,color:"#9CA3AF"}}>✅ 已購買/已帶走 ({bought.length})</h3>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {bought.map(item=>{
            const cat=SHOPPING_CATEGORIES.find(c=>c.id===item.category), buyer=fm(item.boughtBy);

                <span style={{fontSize:16}}>{cat?.icon}</span>
                <span style={{fontSize:14,textDecoration:"line-through",color:"#9CA3AF"}}>{item.name}</span>
                <span style={{fontSize:11,color:buyer?.color||"#9CA3AF",display:"inline-flex",alignItems:"center",gap:2}}><MiniAvatar member={buyer} size={14}/> {buyer?.name}</span>
                <div style={{flex:1}}/>
                <button style={{background:"none",border:"none",cursor:"pointer",color:"#D1D5DB",fontSize:14}} onClick={()=>delShop(item.id)}>✕</button>

        <button style={{marginTop:10,padding:"8px 16px",borderRadius:8,border:"1px solid #EF4444",background:"transparent",color:"#EF4444",fontSize:12,fontWeight:600,cursor:"pointer"}} onClick={()=>{setShop(p=>p.filter(i=>!i.boughtBy));notify("已清除");}}>清除已購買</button>
      </>}
    </div>);
  };

  const parseICSContent = (text) => {
    const es = [], ls = text.split("\n");
    // Handle ICS line folding
    const unfolded = [];
    for (const l of ls) {
      if ((l.startsWith(" ") || l.startsWith("\t")) && unfolded.length > 0) {
        unfolded[unfolded.length - 1] += l.slice(1);
      } else {
        unfolded.push(l);
      }
    }
    let c = null;
    for (const l of unfolded) {
      const t = l.trim().replace(/\r/g, "");
      if (t === "BEGIN:VEVENT") c = {};
      else if (t === "END:VEVENT" && c) {
        if (c.t && c.d) es.push({ id: gid(), title: c.t, type: "google", members: curUser ? [curUser] : [], date: c.d, endDate: c.e || "", note: c.desc || "", allDay: !c.time, time: c.time || "", location: c.loc || "" });
        c = null;
      } else if (c) {
        const colonIdx = t.indexOf(":");
        if (colonIdx < 0) continue;
        const propPart = t.slice(0, colonIdx).toUpperCase();
        const valPart = t.slice(colonIdx + 1);
        const propName = propPart.split(";")[0];
        if (propName === "SUMMARY") c.t = valPart;
        else if (propName === "LOCATION") c.loc = valPart;
        else if (propName === "DESCRIPTION") c.desc = valPart.replace(/\\n/g, "\n").replace(/\\,/g, ",").slice(0, 200);
        else if (propName === "DTSTART") {
          const v = valPart.replace(/[^0-9T]/g, "");
          if (v.length >= 8) c.d = `${v.slice(0,4)}-${v.slice(4,6)}-${v.slice(6,8)}`;
          if (v.includes("T") && v.length >= 13) { const tI = v.indexOf("T"); c.time = `${v.slice(tI+1,tI+3)}:${v.slice(tI+3,tI+5)}`; }
        } else if (propName === "DTEND") {
          const v = valPart.replace(/[^0-9T]/g, "");
          if (v.length >= 8) {
            let ed = `${v.slice(0,4)}-${v.slice(4,6)}-${v.slice(6,8)}`;
            if (propPart.includes("VALUE=DATE") || !v.includes("T")) {
              const d2 = new Date(parseInt(v.slice(0,4)), parseInt(v.slice(4,6))-1, parseInt(v.slice(6,8)));
              d2.setDate(d2.getDate() - 1);
              ed = fmtD(d2);
            }
            c.e = ed;
          }
        }
      }
    }
    return es;
  };

  const doParseICS = async () => {
    const text = icsTxt.trim();
    if (!text) { notify("請輸入 ICS 內容或網址","info"); return; }
    if (text.startsWith("http://") || text.startsWith("https://")) {
      setIcsLoading(true);
      try {
        let icsText = "";
        try { const res = await fetch(text); if (res.ok) icsText = await res.text(); } catch(e) {}
        if (!icsText) {
          try { const res2 = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(text)}`); if (res2.ok) icsText = await res2.text(); } catch(e) {}
        }
        if (!icsText) { notify("無法下載 ICS，請確認網址是否正確","info"); setIcsLoading(false); return; }
        const es = parseICSContent(icsText);
        if (es.length === 0) notify("解析成功但未找到事件","info");
        else notify(`成功解析 ${es.length} 筆事件`);
        setIcsPv(es);
      } catch(err) { notify("下載或解析失敗：" + err.message, "info"); }
      setIcsLoading(false);
    } else {
      const es = parseICSContent(text);
      if (es.length === 0) notify("未找到事件，請確認 ICS 格式","info");
      setIcsPv(es);
    }
  };

        <div><label style={S.lbl}>事件類型</label><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{EVENT_TYPES.filter(t=>t.id!=="google").map(t=><span key={t.id} style={S.chip(f.type===t.id,t.color)} onClick={()=>up("type",t.id)}>{t.icon} {t.label}</span>)}</div></div>
        <div><label style={S.lbl}>相關家人</label><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{members.map(m=><span key={m.id} style={{...S.chip(f.members.includes(m.id),m.color),display:"inline-flex",alignItems:"center",gap:4}} onClick={()=>tgl(m.id)}><MiniAvatar member={m} size={16}/> {m.name}</span>)}</div></div>
        <div style={{display:"flex",gap:12}}><div style={{flex:1}}><label style={S.lbl}>日期</label><input style={S.inp} type="date" value={f.date} onChange={e=>up("date",e.target.value)}/></div><div style={{flex:1}}><label style={S.lbl}>結束日期</label><input style={S.inp} type="date" value={f.endDate} onChange={e=>up("endDate",e.target.value)}/></div></div>
        <div style={{display:"flex",gap:12}}>
          <div style={{flex:1}}><label style={S.lbl}>時間</label><input style={S.inp} type="time" value={f.time||""} onChange={e=>up("time",e.target.value)}/></div>
          <div style={{flex:1}}><label style={S.lbl}>重複</label><select style={S.inp} value={f.recurring||""} onChange={e=>up("recurring",e.target.value)}>
            <option value="">不重複</option>
            <option value="daily">每天</option>
            <option value="weekday">每個工作日（週一至週五）</option>
            <option value="weekly">每週</option>
            <option value="monthly">每月</option>
            <option value="yearly">每年</option>
          </select></div>
        </div>
        <div><label style={S.lbl}>📍 地點</label><CInput style={S.inp} placeholder="例：兒科診所、學校..." value={f.location||""} onChange={e=>up("location",e.target.value)}/></div>
        {f.type==="home"&&<div><label style={S.lbl}>住處</label><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{homes.map(h=><span key={h.id} style={{...S.chip(f.home===h.id,h.color),padding:"10px 16px"}} onClick={()=>up("home",h.id)}>{h.emoji} {h.label}</span>)}</div></div>}
        <div><label style={S.lbl}>備註</label><CTextarea style={{...S.inp,minHeight:60,resize:"vertical"}} placeholder="記得帶健保卡..." value={f.note} onChange={e=>up("note",e.target.value)}/></div>
        <div style={{display:"flex",gap:10,marginTop:4}}>
          {editEv&&<button style={{flex:1,padding:12,borderRadius:12,border:"1px solid #EF4444",background:"transparent",color:"#EF4444",fontWeight:700,fontSize:14,cursor:"pointer"}} onClick={()=>{delEv(editEv.id);setShowAdd(false);setEditEv(null);}}>刪除</button>}
          <button style={{flex:2,padding:12,borderRadius:12,border:"none",background:"linear-gradient(135deg,#F97316,#EC4899)",color:"white",fontWeight:700,fontSize:14,cursor:"pointer",boxShadow:"0 4px 12px rgba(249,115,22,0.3)"}} onClick={()=>saveEv(f)}>{editEv?"儲存":"新增"}</button>
        </div>
      </div>
    </div></div>);
  };

  /* ═══ MAMA ADMIN PANEL ═══ */
  const AdminPanel=()=>{
    const [adminFlt, setAdminFlt] = useState("all"); // all, home, class, vaccine, activity, doctor, other
    const [adminSearch, setAdminSearch] = useState("");
    const [selEvents, setSelEvents] = useState([]);
    const [batchMember, setBatchMember] = useState("");
    const [showBatchAdd, setShowBatchAdd] = useState(false);
    const [batchForm, setBatchForm] = useState({title:"",type:"activity",members:[],date:fmtD(new Date()),endDate:"",note:"",allDay:true,time:"",home:"",recurring:"",location:""});

    const filteredEvs = events.filter(e=>{
      if(adminFlt!=="all" && e.type!==adminFlt) return false;
      if(adminSearch && !e.title.toLowerCase().includes(adminSearch.toLowerCase())) return false;
      return true;
    }).sort((a,b)=>b.date.localeCompare(a.date));

    const toggleSel=(id)=>setSelEvents(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
    const selAll=()=>setSelEvents(filteredEvs.map(e=>e.id));
    const selNone=()=>setSelEvents([]);

    const batchDelete=()=>{if(!confirm(`確定要刪除 ${selEvents.length} 筆事件？`))return;setEvents(p=>p.filter(e=>!selEvents.includes(e.id)));setSelEvents([]);notify(`已刪除 ${selEvents.length} 筆`);};
    const batchAssign=()=>{if(!batchMember)return;setEvents(p=>p.map(e=>selEvents.includes(e.id)?{...e,members:e.members?.includes(batchMember)?e.members:[...(e.members||[]),batchMember]}:e));notify(`已指派 ${selEvents.length} 筆給 ${fm(batchMember)?.name}`);setSelEvents([]);setBatchMember("");};
    const batchRemoveMember=()=>{if(!batchMember)return;setEvents(p=>p.map(e=>selEvents.includes(e.id)?{...e,members:(e.members||[]).filter(x=>x!==batchMember)}:e));notify(`已移除 ${fm(batchMember)?.name}`);setSelEvents([]);setBatchMember("");};

    const batchUp=(k,v)=>setBatchForm(p=>({...p,[k]:v}));
    const batchTgl=(id)=>setBatchForm(p=>({...p,members:p.members.includes(id)?p.members.filter(x=>x!==id):[...p.members,id]}));
    const batchAddEv=()=>{if(!batchForm.title.trim()){notify("請輸入事件名稱","info");return;}setEvents(p=>[...p,{...batchForm,id:gid()}]);notify("已新增 ✓");setBatchForm({title:"",type:"activity",members:[],date:fmtD(new Date()),endDate:"",note:"",allDay:true,time:"",home:"",recurring:"",location:""});};

    return(
    <div style={S.card}>
      <h2 style={{margin:"0 0 4px",fontSize:20,fontWeight:700}}>👑 媽媽後台管理</h2>
      <p style={{color:"#6B7280",fontSize:12,margin:"0 0 20px"}}>批次管理所有家族活動</p>

      {/* Quick add */}
      <div style={{marginBottom:20,padding:16,borderRadius:14,background:"#FDF2F8",border:"1px solid #EC489933"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showBatchAdd?12:0}}>
          <span style={{fontSize:13,fontWeight:700,color:"#BE185D"}}>✨ 快速新增事件</span>
          <button style={{...S.tb,fontSize:11,padding:"4px 10px",borderColor:"#EC4899",color:"#EC4899"}} onClick={()=>setShowBatchAdd(!showBatchAdd)}>{showBatchAdd?"收起":"展開"}</button>
        </div>
        {showBatchAdd&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <CInput style={{...S.inp,flex:2,minWidth:140}} placeholder="事件名稱" value={batchForm.title} onChange={e=>batchUp("title",e.target.value)}/>
            <select style={{...S.inp,flex:1,minWidth:100}} value={batchForm.type} onChange={e=>batchUp("type",e.target.value)}>
              {EVENT_TYPES.filter(t=>t.id!=="google").map(t=><option key={t.id} value={t.id}>{t.icon} {t.label}</option>)}
            </select>
          </div>
          <div style={{display:"flex",gap:8}}>
            <input style={{...S.inp,flex:1}} type="date" value={batchForm.date} onChange={e=>batchUp("date",e.target.value)}/>
            <input style={{...S.inp,flex:1}} type="date" value={batchForm.endDate} onChange={e=>batchUp("endDate",e.target.value)} placeholder="結束日期"/>
            <input style={{...S.inp,flex:1}} type="time" value={batchForm.time||""} onChange={e=>batchUp("time",e.target.value)}/>
          </div>
          <div><span style={{fontSize:11,fontWeight:600,color:"#6B7280"}}>指派對象：</span>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>{members.map(m=><span key={m.id} style={{...S.chip(batchForm.members.includes(m.id),m.color),padding:"4px 10px",fontSize:11}} onClick={()=>batchTgl(m.id)}><MiniAvatar member={m} size={14}/> {m.name}</span>)}</div>
          </div>
          {batchForm.type==="home"&&<div><span style={{fontSize:11,fontWeight:600,color:"#6B7280"}}>住處：</span>
            <div style={{display:"flex",gap:4,marginTop:4}}>{homes.map(h=><span key={h.id} style={{...S.chip(batchForm.home===h.id,h.color),padding:"4px 10px",fontSize:11}} onClick={()=>batchUp("home",h.id)}>{h.emoji} {h.label}</span>)}</div>
          </div>}
          <CInput style={S.inp} placeholder="📍 地點（選填）" value={batchForm.location||""} onChange={e=>batchUp("location",e.target.value)}/>
          <CInput style={S.inp} placeholder="備註（選填）" value={batchForm.note} onChange={e=>batchUp("note",e.target.value)}/>
          <button style={{padding:"10px 20px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#EC4899,#F97316)",color:"white",fontWeight:700,fontSize:14,cursor:"pointer"}} onClick={batchAddEv}>+ 新增事件</button>
        </div>}
      </div>

      {/* Filters & search */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        <CInput style={{...S.inp,flex:1,minWidth:140,padding:"8px 12px"}} placeholder="🔍 搜尋事件..." value={adminSearch} onChange={e=>setAdminSearch(e.target.value)}/>
        <select style={{...S.inp,width:"auto",padding:"8px 12px"}} value={adminFlt} onChange={e=>setAdminFlt(e.target.value)}>
          <option value="all">全部類型</option>
          {EVENT_TYPES.filter(t=>t.id!=="google").map(t=><option key={t.id} value={t.id}>{t.icon} {t.label}</option>)}
        </select>
      </div>

      {/* Batch actions */}
      {selEvents.length>0&&(
        <div style={{display:"flex",gap:8,marginBottom:12,padding:"10px 14px",borderRadius:10,background:"#EFF6FF",border:"1px solid #3B82F633",flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:12,fontWeight:700,color:"#3B82F6"}}>已選 {selEvents.length} 筆</span>
          <select style={{...S.inp,width:"auto",padding:"4px 8px",fontSize:11}} value={batchMember} onChange={e=>setBatchMember(e.target.value)}>
            <option value="">選擇成員...</option>
            {members.map(m=><option key={m.id} value={m.id}>{m.emoji} {m.name}</option>)}
          </select>
          <button style={{padding:"4px 10px",borderRadius:6,border:"none",background:"#3B82F6",color:"white",fontSize:11,fontWeight:700,cursor:"pointer"}} onClick={batchAssign}>+ 指派</button>
          <button style={{padding:"4px 10px",borderRadius:6,border:"none",background:"#F59E0B",color:"white",fontSize:11,fontWeight:700,cursor:"pointer"}} onClick={batchRemoveMember}>- 移除</button>
          <button style={{padding:"4px 10px",borderRadius:6,border:"none",background:"#EF4444",color:"white",fontSize:11,fontWeight:700,cursor:"pointer"}} onClick={batchDelete}>🗑 刪除</button>
          <button style={{padding:"4px 10px",borderRadius:6,border:"1px solid #D1D5DB",background:"white",color:"#6B7280",fontSize:11,fontWeight:600,cursor:"pointer"}} onClick={selNone}>取消全選</button>
        </div>
      )}

      {/* Select all / none */}
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <button style={{fontSize:11,color:"#3B82F6",background:"none",border:"none",cursor:"pointer",fontWeight:600}} onClick={selAll}>全選 ({filteredEvs.length})</button>
        <span style={{color:"#D1D5DB"}}>|</span>
        <span style={{fontSize:11,color:"#9CA3AF"}}>共 {events.length} 筆事件</span>
      </div>

      {/* Event list */}
      <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:500,overflowY:"auto"}}>
        {filteredEvs.map(e=>{
          const t=EVENT_TYPES.find(t2=>t2.id===e.type);
          const sel=selEvents.includes(e.id);
          return(
            <div key={e.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:10,background:sel?"#EFF6FF":"#F9FAFB",border:sel?"2px solid #3B82F6":"1px solid #E5E7EB",cursor:"pointer"}} onClick={()=>toggleSel(e.id)}>
              <div style={{width:20,height:20,borderRadius:5,border:sel?"2px solid #3B82F6":"2px solid #D1D5DB",background:sel?"#3B82F6":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"white",fontSize:12,fontWeight:700}}>{sel?"✓":""}</div>
              <span style={{fontSize:14}}>{t?.icon}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title}</div>
                <div style={{fontSize:10,color:"#9CA3AF"}}>{e.date}{e.endDate&&` ~ ${e.endDate}`}{e.time&&` ${e.time}`}</div>
              </div>
              <div style={{display:"flex",gap:2,flexShrink:0}}>
                {e.members?.map(mid=>{const m=fm(mid);return m?<MiniAvatar key={mid} member={m} size={16}/>:null;})}
              </div>
              <button style={{background:"none",border:"none",cursor:"pointer",fontSize:12,padding:2,color:"#9CA3AF"}} onClick={(ev)=>{ev.stopPropagation();setEditEv(e);setShowAdd(true);}}>✏️</button>
              <button style={{background:"none",border:"none",cursor:"pointer",fontSize:12,padding:2,color:"#EF4444"}} onClick={(ev)=>{ev.stopPropagation();delEv(e.id);}}>✕</button>
            </div>
          );
        })}
        {filteredEvs.length===0&&<div style={{textAlign:"center",padding:24,color:"#9CA3AF",fontSize:13}}>沒有符合的事件</div>}
      </div>
    </div>);
  };

  /* ═══ RENDER ═══ */

  return(
    <div style={S.root}>
      <style>{`
        *{box-sizing:border-box;margin:0;padding:0}
        @keyframes slideDown{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
        button:hover{filter:brightness(1.05)}
        input:focus,textarea:focus,select:focus{border-color:#F97316!important;box-shadow:0 0 0 3px rgba(249,115,22,0.1)}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px}
      `}</style>
      <Notif/>
      <header style={S.hdr}>
        <div style={S.logo} onClick={goToday}>
          <div style={S.logoI}>🏠</div>
          <div><div style={S.logoT}>我們家的行事曆</div><div style={{fontSize:11,color:"#10B981",fontWeight:500}}>☁️ 雲端同步中</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <UserDisplay/>
          <nav style={S.nav}>{tabs.map(t=><button key={t.id} style={S.nb(tab===t.id)} onClick={()=>setTab(t.id)}>{t.icon} {t.label}</button>)}</nav>
        </div>
      </header>
      <main style={S.main}>
        {tab==="calendar"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:20}}>
          {[{icon:"📅",label:"本月事件",value:events.filter(e=>e.date.startsWith(`${Y}-${pad(M+1)}`)).length,color:"#F97316",target:"calendar"},{icon:"💉",label:"待打疫苗",value:upVax.length,color:"#EF4444",target:"vaccine"},{icon:"🏠",label:"住處安排",value:homeEvs.filter(e=>e.date>=fmtD(new Date())).length,color:"#8B5CF6",target:"homes"},{icon:"🛒",label:"待購物品",value:shop.filter(i=>!i.boughtBy).length,color:"#6366F1",target:"shopping"}].map((s,i)=>(
            <div key={i} style={{...S.card,padding:"16px 20px",display:"flex",alignItems:"center",gap:14,cursor:"pointer",transition:"all 0.15s"}} onClick={()=>setTab(s.target)} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 12px 36px rgba(0,0,0,0.1)";}} onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 8px 32px rgba(0,0,0,0.06)";}}>
              <div style={{width:44,height:44,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,background:`${s.color}10`}}>{s.icon}</div>
              <div><div style={{fontSize:22,fontWeight:800,color:s.color}}>{s.value}</div><div style={{fontSize:11,color:"#9CA3AF",fontWeight:600}}>{s.label}</div></div>
            </div>
          ))}
        </div>}
        {tab==="calendar"&&<CalView/>}
        {tab==="calendar"&&<DayDetail/>}
        {tab==="homes"&&<HomeView/>}
        {tab==="vaccine"&&<VaxView/>}
        {tab==="shopping"&&<ShopView/>}
        {tab==="settings"&&<SettingsView/>}
        {tab==="admin"&&isMama&&<AdminPanel/>}
      </main>
      <button style={S.fab} onClick={()=>{setEditEv(null);setShowAdd(true);}} onMouseEnter={e=>{e.target.style.transform="scale(1.08)";}} onMouseLeave={e=>{e.target.style.transform="scale(1)";}}>+</button>
      {showAdd&&<EvModal/>}
      {showICS&&<ICSModal/>}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null, info: null }; }
  componentDidCatch(error, info) { this.setState({ error, info }); }
  render() {
    if (this.state.error) {
      return React.createElement('div', {style:{padding:24,fontFamily:'sans-serif'}},
        React.createElement('h2', {style:{color:'#EF4444'}}, '⚠️ 程式錯誤'),
        React.createElement('pre', {style:{background:'#FEF2F2',padding:16,borderRadius:8,overflow:'auto',fontSize:12,whiteSpace:'pre-wrap'}},
          String(this.state.error) + '\n\n' + (this.state.info?.componentStack || '')
        ),
        React.createElement('button', {onClick:()=>location.reload(),style:{marginTop:12,padding:'8px 20px',borderRadius:8,border:'1px solid #ccc',cursor:'pointer'}}, '重新整理')
      );
    }
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ErrorBoundary, null, React.createElement(FamilyCalendar)));
</script>
</body>
</html>
